services:

  bookstore:
    build: ./bookstore
    ports:
      - "4000:4000"
    depends_on:
      - api-gateway

  bookstore-api:
    build: ./bookstore-api
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017/bookstore
    depends_on:
      - mongo

  order-service:
    build: ./order-service
    ports:
      - "3001:3001"
    environment:
      - HOST=0.0.0.0
      - PORT=3001

  payment-service:
    build: ./payment-service
    ports:
      - "3002:3002"
    environment:
      - HOST=0.0.0.0
      - PORT=3002

  api-gateway:
    build: ./api-gateway
    ports:
      - "9001:9001"
    environment:
      - HOST=0.0.0.0
      - PORT=9001
      - INVENTORY_SERVICE_URL=http://bookstore-api:3000
      - ORDER_SERVICE_URL=http://order-service:3001
      - PAYMENT_SERVICE_URL=http://payment-service:3002
    depends_on:
      - bookstore-api
      - order-service
      - payment-service

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: