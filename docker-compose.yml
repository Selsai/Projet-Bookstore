services:
  app:
    build: ./bookstore
    ports:
      - "4000:4000"
    depends_on:
      - api
    environment:
      - API_URL=http://api:3000/books
    volumes:
      - ./bookstore:/app
      - /app/node_modules
  api:
    build: ./bookstore-api
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/bookstore
      - HOST=0.0.0.0
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data: